name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Create www directory
        run: mkdir -p www

      - name: Remove any existing android folder
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Create custom Java classes for Sunmi printer
        run: |
          mkdir -p android/app/src/main/java/com/lotato/print
          cat > android/app/src/main/java/com/lotato/print/MainActivity.java << 'EOF'
          package com.lotato.print;
          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
              @Override
              public void onCreate(Bundle savedInstanceState) {
                  registerPlugin(SunmiPrinterPlugin.class);
                  super.onCreate(savedInstanceState);
              }
          }
          EOF
          cat > android/app/src/main/java/com/lotato/print/SunmiPrinterPlugin.java << 'EOF'
          package com.lotato.print;
          import android.os.RemoteException;
          import com.getcapacitor.JSObject;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;
          import com.sunmi.peripheral.printer.InnerPrinterCallback;
          import com.sunmi.peripheral.printer.InnerPrinterException;
          import com.sunmi.peripheral.printer.InnerPrinterManager;
          import com.sunmi.peripheral.printer.SunmiPrinterService;
          @CapacitorPlugin(name = "SunmiPrinter")
          public class SunmiPrinterPlugin extends Plugin {
              private SunmiPrinterService sunmiPrinterService;
              @PluginMethod
              public void bindService(PluginCall call) {
                  try {
                      InnerPrinterManager.getInstance().bindService(getContext(), new InnerPrinterCallback() {
                          @Override
                          public void onConnected(SunmiPrinterService service) {
                              sunmiPrinterService = service;
                              JSObject ret = new JSObject();
                              ret.put("status", "connected");
                              call.resolve(ret);
                          }
                          @Override
                          public void onDisconnected() {
                              sunmiPrinterService = null;
                          }
                      });
                  } catch (InnerPrinterException e) {
                      call.reject("InnerPrinterException: " + e.getMessage());
                  }
              }
              @PluginMethod
              public void printText(PluginCall call) {
                  String text = call.getString("text");
                  if (sunmiPrinterService != null && text != null) {
                      try {
                          sunmiPrinterService.printText(text, null);
                          call.resolve();
                      } catch (RemoteException e) {
                          call.reject("RemoteException: " + e.getMessage());
                      }
                  } else {
                      call.reject("Printer service not connected");
                  }
              }
              @PluginMethod
              public void cutPaper(PluginCall call) {
                  if (sunmiPrinterService != null) {
                      try {
                          sunmiPrinterService.cutPaper(null);
                          call.resolve();
                      } catch (RemoteException e) {
                          call.reject("RemoteException: " + e.getMessage());
                      }
                  } else {
                      call.reject("Printer service not connected");
                  }
              }
              @PluginMethod
              public void getServiceStatus(PluginCall call) {
                  JSObject ret = new JSObject();
                  ret.put("connected", sunmiPrinterService != null);
                  call.resolve(ret);
              }
          }
          EOF

      - name: Add Sunmi SDK dependency
        run: |
          echo "" >> android/app/build.gradle
          echo "dependencies {" >> android/app/build.gradle
          echo "    implementation 'com.sunmi:printerlibrary:1.0.23'" >> android/app/build.gradle
          echo "}" >> android/app/build.gradle

      - name: Add permissions to AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<manifest/a\    <uses-permission android:name="com.sunmi.permission.USE_PRINTER_SERVICE" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.BLUETOOTH" />' $MANIFEST

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build Android APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
