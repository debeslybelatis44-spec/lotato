name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Create www directory (required by Capacitor)
        run: mkdir -p www

      - name: Remove any existing android folder
        run: rm -rf android

      - name: Add Android platform
        run: npx cap add android

      - name: Add printer permission to AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Insère la permission après la balise <manifest>
          sed -i '/<manifest/a\    <uses-permission android:name="com.sunmi.permission.USE_PRINTER_SERVICE" />' $MANIFEST

      - name: Sync Capacitor
        run: npx cap sync

      - name: Build Android APK (debug)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
